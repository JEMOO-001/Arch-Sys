<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentinel Connect - Sunset Orange</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #fff3e0 0%, #ffe0b2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: #fff;
            border-radius: 24px;
            padding: 48px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 25px 50px rgba(230,81,0,0.15);
        }
        .logo { text-align: center; margin-bottom: 35px; }
        .logo-icon {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #ff6f00, #e65100);
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            box-shadow: 0 8px 25px rgba(255,111,0,0.4);
        }
        .logo h1 { color: #4e342e; font-size: 28px; font-weight: 700; }
        .logo p { color: #ff6f00; font-size: 14px; margin-top: 5px; }
        .form-group { margin-bottom: 22px; }
        .form-group label { display: block; color: #4e342e; font-size: 14px; margin-bottom: 8px; font-weight: 600; }
        .form-group input {
            width: 100%;
            padding: 16px 18px;
            border: 2px solid #ffe0b2;
            border-radius: 12px;
            background: #fff;
            color: #4e342e;
            font-size: 15px;
            transition: all 0.3s;
        }
        .form-group input:focus { outline: none; border-color: #ff6f00; box-shadow: 0 0 0 4px rgba(255,111,0,0.15); }
        .btn {
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #ff6f00, #e65100);
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 15px;
        }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(255,111,0,0.4); }
        .status { display: flex; align-items: center; gap: 10px; margin-bottom: 25px; padding: 14px; border-radius: 12px; background: #fff3e0; border: 1px solid #ffcc80; }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; background: #22c55e; box-shadow: 0 0 10px #22c55e; }
        .status-text { color: #e65100; font-size: 13px; font-weight: 500; }
        .footer { text-align: center; margin-top: 25px; font-size: 12px; color: #8d6e63; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <div class="logo-icon">
                <svg width="36" height="36" viewBox="0 0 24 24" fill="white"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
            </div>
            <h1>Sentinel</h1>
            <p>Enterprise GIS Archiving</p>
        </div>
        <div class="status">
            <div class="status-dot"></div>
            <span class="status-text">Server is online</span>
        </div>
        <form>
            <div class="form-group">
                <label>Username</label>
                <input type="text" placeholder="Enter your username">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" placeholder="Enter your password">
            </div>
            <button class="btn">Connect</button>
        </form>
        <div class="footer">Sentinel v1.0 | Sunset Orange</div>
    </div>
</body>
</html>
