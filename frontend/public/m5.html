<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentinel Connect - Purple Haze</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #1a1a2e;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: linear-gradient(180deg, #2d2d44 0%, #1a1a2e 100%);
            border-radius: 20px;
            padding: 44px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            border: 1px solid rgba(157,78,221,0.2);
        }
        .logo { text-align: center; margin-bottom: 32px; }
        .logo-icon {
            width: 68px;
            height: 68px;
            background: linear-gradient(135deg, #7b2cbf, #9d4edd);
            border-radius: 20px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 18px;
            box-shadow: 0 10px 30px rgba(157,78,221,0.4);
            transform: rotate(-5deg);
        }
        .logo h1 { color: #e0e0e0; font-size: 26px; font-weight: 700; }
        .logo p { color: #9d4edd; font-size: 14px; margin-top: 5px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; color: #e0e0e0; font-size: 14px; margin-bottom: 8px; font-weight: 500; }
        .form-group input {
            width: 100%;
            padding: 15px 17px;
            border: 2px solid rgba(157,78,221,0.3);
            border-radius: 10px;
            background: rgba(0,0,0,0.3);
            color: #e0e0e0;
            font-size: 15px;
            transition: all 0.3s;
        }
        .form-group input:focus { outline: none; border-color: #9d4edd; box-shadow: 0 0 0 4px rgba(157,78,221,0.2); }
        .form-group input::placeholder { color: rgba(224,224,224,0.4); }
        .btn {
            width: 100%;
            padding: 17px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #7b2cbf, #9d4edd);
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 12px;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 12px 24px rgba(157,78,221,0.45); }
        .status { display: flex; align-items: center; gap: 10px; margin-bottom: 24px; padding: 13px; border-radius: 10px; background: rgba(157,78,221,0.1); border: 1px solid rgba(157,78,221,0.2); }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; background: #22c55e; box-shadow: 0 0 10px #22c55e; }
        .status-text { color: #c77dff; font-size: 13px; font-weight: 500; }
        .footer { text-align: center; margin-top: 24px; font-size: 12px; color: rgba(224,224,224,0.5); }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <div class="logo-icon">
                <svg width="34" height="34" viewBox="0 0 24 24" fill="white"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/></svg>
            </div>
            <h1>Sentinel</h1>
            <p>Enterprise GIS Archiving</p>
        </div>
        <div class="status">
            <div class="status-dot"></div>
            <span class="status-text">Server is online</span>
        </div>
        <form>
            <div class="form-group">
                <label>Username</label>
                <input type="text" placeholder="Enter your username">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" placeholder="Enter your password">
            </div>
            <button class="btn">Connect</button>
        </form>
        <div class="footer">Sentinel v1.0 | Purple Haze</div>
    </div>
</body>
</html>
