<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentinel Connect - Cyan Frost</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0d1117 0%, #161b22 50%, #0d1117 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }
        body::before {
            content: '';
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(56,189,248,0.1) 0%, transparent 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        .container {
            background: rgba(22,27,34,0.8);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 44px;
            width: 100%;
            max-width: 400px;
            border: 1px solid rgba(56,189,248,0.15);
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            position: relative;
        }
        .glow { position: absolute; top: -1px; left: 20%; right: 20%; height: 2px; background: linear-gradient(90deg, transparent, #22d3ee, transparent); }
        .logo { text-align: center; margin-bottom: 32px; }
        .logo-icon {
            width: 64px;
            height: 64px;
            background: rgba(34,211,238,0.1);
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 18px;
            border: 2px solid rgba(34,211,238,0.3);
        }
        .logo h1 { color: #f0f9ff; font-size: 26px; font-weight: 700; letter-spacing: 2px; }
        .logo p { color: #22d3ee; font-size: 13px; margin-top: 5px; letter-spacing: 1px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; color: #94a3b8; font-size: 13px; margin-bottom: 8px; font-weight: 500; }
        .form-group input {
            width: 100%;
            padding: 15px 17px;
            border: 1px solid rgba(56,189,248,0.2);
            border-radius: 10px;
            background: rgba(13,17,23,0.6);
            color: #f0f9ff;
            font-size: 14px;
            transition: all 0.3s;
        }
        .form-group input:focus { outline: none; border-color: #22d3ee; box-shadow: 0 0 15px rgba(34,211,238,0.2); }
        .form-group input::placeholder { color: #484f58; }
        .btn {
            width: 100%;
            padding: 17px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #0891b2, #06b6d4);
            color: white;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 12px;
            letter-spacing: 1px;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 15px 30px rgba(6,182,212,0.4); }
        .status { display: flex; align-items: center; gap: 10px; margin-bottom: 24px; padding: 13px; border-radius: 10px; background: rgba(34,211,238,0.08); border: 1px solid rgba(34,211,238,0.15); }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; background: #22d3ee; box-shadow: 0 0 12px #22d3ee; }
        .status-text { color: #22d3ee; font-size: 13px; }
        .footer { text-align: center; margin-top: 24px; font-size: 12px; color: #484f58; }
    </style>
</head>
<body>
    <div class="container">
        <div class="glow"></div>
        <div class="logo">
            <div class="logo-icon">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="#22d3ee"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
            </div>
            <h1>SENTINEL</h1>
            <p>Enterprise GIS Archiving</p>
        </div>
        <div class="status">
            <div class="status-dot"></div>
            <span class="status-text">Server is online</span>
        </div>
        <form>
            <div class="form-group">
                <label>Username</label>
                <input type="text" placeholder="Enter your username">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" placeholder="Enter your password">
            </div>
            <button class="btn">CONNECT</button>
        </form>
        <div class="footer">Sentinel v1.0 | Cyan Frost</div>
    </div>
</body>
</html>
