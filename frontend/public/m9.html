<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentinel Connect - Midnight</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'SF Pro Display', -apple-system, sans-serif;
            background: #030712;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: #111827;
            border-radius: 2px;
            padding: 48px;
            width: 100%;
            max-width: 360px;
            box-shadow: none;
            border-left: 3px solid #10b981;
        }
        .logo { text-align: center; margin-bottom: 32px; padding-bottom: 24px; border-bottom: 1px solid #1f2937; }
        .logo-icon {
            width: 48px;
            height: 48px;
            background: #10b981;
            border-radius: 2px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
        }
        .logo h1 { color: #f9fafb; font-size: 20px; font-weight: 600; letter-spacing: 4px; text-transform: uppercase; }
        .logo p { color: #6b7280; font-size: 11px; margin-top: 4px; letter-spacing: 2px; text-transform: uppercase; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; color: #9ca3af; font-size: 11px; margin-bottom: 8px; font-weight: 500; text-transform: uppercase; letter-spacing: 1px; }
        .form-group input {
            width: 100%;
            padding: 12px 14px;
            border: none;
            border-bottom: 1px solid #374151;
            border-radius: 0;
            background: transparent;
            color: #f9fafb;
            font-size: 14px;
            transition: all 0.2s;
        }
        .form-group input:focus { outline: none; border-bottom-color: #10b981; }
        .form-group input::placeholder { color: #4b5563; }
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 2px;
            background: #10b981;
            color: #030712;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 16px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .btn:hover { background: #059669; }
        .status { display: flex; align-items: center; gap: 8px; margin-bottom: 24px; padding: 10px; border-radius: 2px; background: rgba(16,185,129,0.1); border: 1px solid #064e3b; }
        .status-dot { width: 6px; height: 6px; border-radius: 50%; background: #10b981; }
        .status-text { color: #6b7280; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }
        .footer { text-align: center; margin-top: 24px; font-size: 10px; color: #374151; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <div class="logo-icon">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="#030712"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
            </div>
            <h1>Sentinel</h1>
            <p>Enterprise GIS Archiving</p>
        </div>
        <div class="status">
            <div class="status-dot"></div>
            <span class="status-text">Server is online</span>
        </div>
        <form>
            <div class="form-group">
                <label>Username</label>
                <input type="text" placeholder="Enter your username">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" placeholder="Enter your password">
            </div>
            <button class="btn">Connect</button>
        </form>
        <div class="footer">Sentinel v1.0 | Midnight</div>
    </div>
</body>
</html>
