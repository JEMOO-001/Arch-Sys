<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentinel Connect - Ocean Blue</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #f0f8ff 0%, #e0f2fe 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: #ffffff;
            border-radius: 24px;
            padding: 48px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(0,119,182,0.15);
        }
        .logo { text-align: center; margin-bottom: 35px; }
        .logo-icon {
            width: 72px;
            height: 72px;
            background: linear-gradient(135deg, #0077b6, #023e8a);
            border-radius: 20px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,119,182,0.3);
        }
        .logo h1 { color: #023e8a; font-size: 28px; font-weight: 700; }
        .logo p { color: #0077b6; font-size: 14px; margin-top: 5px; }
        .form-group { margin-bottom: 22px; }
        .form-group label { display: block; color: #333; font-size: 14px; margin-bottom: 8px; font-weight: 600; }
        .form-group input {
            width: 100%;
            padding: 16px 18px;
            border: 2px solid #e0f2fe;
            border-radius: 12px;
            background: #f8fafc;
            color: #333;
            font-size: 15px;
            transition: all 0.3s;
        }
        .form-group input:focus { outline: none; border-color: #0077b6; background: #fff; box-shadow: 0 0 0 4px rgba(0,119,182,0.1); }
        .btn {
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #0077b6, #023e8a);
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 15px;
        }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(0,119,182,0.4); }
        .status { display: flex; align-items: center; gap: 10px; margin-bottom: 25px; padding: 14px; border-radius: 12px; background: #f0f9ff; border: 1px solid #bae6fd; }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; background: #22c55e; box-shadow: 0 0 10px #22c55e; }
        .status-text { color: #0369a1; font-size: 13px; font-weight: 500; }
        .footer { text-align: center; margin-top: 25px; font-size: 12px; color: #64748b; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <div class="logo-icon">
                <svg width="36" height="36" viewBox="0 0 24 24" fill="white"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
            </div>
            <h1>Sentinel</h1>
            <p>Enterprise GIS Archiving</p>
        </div>
        <div class="status">
            <div class="status-dot"></div>
            <span class="status-text">Server is online</span>
        </div>
        <form>
            <div class="form-group">
                <label>Username</label>
                <input type="text" placeholder="Enter your username">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" placeholder="Enter your password">
            </div>
            <button class="btn">Connect</button>
        </form>
        <div class="footer">Sentinel v1.0 | Ocean Blue</div>
    </div>
</body>
</html>
