<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentinel Connect - Blossom Pink</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #fdf2f8 0%, #fce7f3 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: #fff;
            border-radius: 28px;
            padding: 48px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 30px 70px rgba(236,72,153,0.2);
        }
        .logo { text-align: center; margin-bottom: 34px; }
        .logo-icon {
            width: 72px;
            height: 72px;
            background: linear-gradient(135deg, #ec4899, #db2777);
            border-radius: 24px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            box-shadow: 0 12px 30px rgba(236,72,153,0.35);
            transform: rotate(8deg);
        }
        .logo h1 { color: #831843; font-size: 28px; font-weight: 700; }
        .logo p { color: #db2777; font-size: 14px; margin-top: 5px; }
        .form-group { margin-bottom: 22px; }
        .form-group label { display: block; color: #831843; font-size: 14px; margin-bottom: 8px; font-weight: 600; }
        .form-group input {
            width: 100%;
            padding: 16px 18px;
            border: 2px solid #fce7f3;
            border-radius: 12px;
            background: #fff;
            color: #831843;
            font-size: 15px;
            transition: all 0.3s;
        }
        .form-group input:focus { outline: none; border-color: #ec4899; box-shadow: 0 0 0 4px rgba(236,72,153,0.15); }
        .btn {
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #ec4899, #db2777);
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 14px;
        }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 15px 35px rgba(236,72,153,0.45); }
        .status { display: flex; align-items: center; gap: 10px; margin-bottom: 26px; padding: 14px; border-radius: 12px; background: #fdf2f8; border: 1px solid #fbcfe8; }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; background: #22c55e; box-shadow: 0 0 10px #22c55e; }
        .status-text { color: #be185d; font-size: 13px; font-weight: 500; }
        .footer { text-align: center; margin-top: 26px; font-size: 12px; color: #9d174d; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <div class="logo-icon">
                <svg width="36" height="36" viewBox="0 0 24 24" fill="white"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
            </div>
            <h1>Sentinel</h1>
            <p>Enterprise GIS Archiving</p>
        </div>
        <div class="status">
            <div class="status-dot"></div>
            <span class="status-text">Server is online</span>
        </div>
        <form>
            <div class="form-group">
                <label>Username</label>
                <input type="text" placeholder="Enter your username">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" placeholder="Enter your password">
            </div>
            <button class="btn">Connect</button>
        </form>
        <div class="footer">Sentinel v1.0 | Blossom Pink</div>
    </div>
</body>
</html>
